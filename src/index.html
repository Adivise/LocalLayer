<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LocalLayer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="glow-bg"></div>

  <!-- Icon sprites (hidden) -->
  <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;">
    <symbol id="icon-save" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
      <polyline points="17 21 17 13 7 13 7 21" />
      <polyline points="7 3 7 8 15 8" />
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6" />
      <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
      <line x1="10" y1="11" x2="10" y2="17" />
      <line x1="14" y1="11" x2="14" y2="17" />
    </symbol>
    <symbol id="icon-add" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19" />
      <line x1="5" y1="12" x2="19" y2="12" />
    </symbol>
    <symbol id="icon-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10" />
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
    </symbol>
    <symbol id="icon-remove" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18" />
      <line x1="6" y1="6" x2="18" y2="18" />
    </symbol>
  </svg>

  <div class="card">
    <div class="header">
      <h2>LocalLayer</h2>
      <p class="subtitle">Perfect for localhost widgets & stream overlays.</p>
    </div>

    <div class="main-content">
      <div class="section-header">
        <h3>Create New Overlay</h3>
        <p class="tips">W/H = 0 for fullscreen.</p>
      </div>
    
      <form id="overlay-form">
        <div id="url-container"></div>
    
        <div class="actions">
          <button id="addUrl" class="add-btn" type="button">
            <svg class="btn-icon" aria-hidden="true"><use href="#icon-add"/></svg>
            Add URL
          </button>
        </div>
    
        <div class="preset-bar">
          <input type="text" id="presetName" placeholder="Preset name">
          <div class="select-wrapper">
            <select id="presetSelect"></select>
          </div>
          <button type="button" id="savePreset" class="icon-btn" title="Save preset">
            <svg class="icon" aria-hidden="true"><use href="#icon-save"/></svg>
          </button>
          <button type="button" id="deletePreset" class="icon-btn danger" title="Delete preset">
            <svg class="icon" aria-hidden="true"><use href="#icon-trash"/></svg>
          </button>
        </div>
    
        <button type="submit" class="submit-btn">
          <svg class="btn-icon" aria-hidden="true"><use href="#icon-add"/></svg>
          Launch Overlays
        </button>
      </form>
    
      <div class="divider"></div>
    
      <div class="section-header">
        <h3>Active Overlays</h3>
        <button id="refreshActive" class="refresh-btn" type="button" title="Refresh">
          <svg class="icon" aria-hidden="true"><use href="#icon-refresh"/></svg>
        </button>
      </div>
    
      <div id="active-list">
        <div class="empty-state">No active overlays</div>
      </div>
    </div>
  </div>
  </div>

  <script src="scripts.js"></script>
</body>

</html>
